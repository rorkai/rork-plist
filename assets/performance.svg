<svg width="960" height="640" viewBox="0 0 960 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Benchmark chart comparing rork-plist with the plist, @expo/plist, bplist-parser, and bplist-creator packages. Bars show time relative to rork-plist as the geometric mean over three representative documents. Parsing XML, plist takes 5.4 times as long and @expo/plist 3.1 times. Building XML, plist takes 12.4 times as long and @expo/plist 4.7 times. Parsing binary in aliasing mode, plist takes 1.3 times as long and bplist-parser 3.3 times. Building binary, plist takes 1.6 times as long and bplist-creator 3.8 times.">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.6" fill="#d0d7de" />
    </pattern>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0d1117" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Dotted backdrop -->
  <rect width="960" height="640" rx="12" fill="#f6f8fa" />
  <rect width="960" height="640" rx="12" fill="url(#dots)" />

  <!-- Terminal card -->
  <rect x="40" y="36" width="880" height="576" rx="16" fill="#0d1117" stroke="#30363d" filter="url(#cardShadow)" />

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
    <text x="88" y="78" fill="#e6edf3" font-weight="bold" font-size="15">Time per document, relative to rork-plist</text>
    <text x="88" y="98" fill="#8b949e">geometric mean over three representative documents &#183; shorter is faster</text>

    <!-- Parse XML -->
    <text x="88" y="130" fill="#8b949e" font-size="11" letter-spacing="2">PARSE XML</text>
    <g>
      <text x="88" y="158" fill="#e6edf3">rork-plist</text>
      <rect x="280" y="148" width="63" height="12" rx="2" fill="#3fb950" />
      <text x="353" y="158" fill="#3fb950">1.0&#215;</text>
    </g>
    <g>
      <text x="88" y="182" fill="#e6edf3">@expo/plist</text>
      <rect x="280" y="172" width="195" height="12" rx="2" fill="#484f58" />
      <text x="485" y="182" fill="#8b949e">3.1&#215; slower</text>
    </g>
    <g>
      <text x="88" y="206" fill="#e6edf3">plist</text>
      <rect x="280" y="196" width="340" height="12" rx="2" fill="#484f58" />
      <text x="630" y="206" fill="#8b949e">5.4&#215; slower</text>
    </g>

    <!-- Build XML -->
    <text x="88" y="238" fill="#8b949e" font-size="11" letter-spacing="2">BUILD XML</text>
    <g>
      <text x="88" y="266" fill="#e6edf3">rork-plist</text>
      <rect x="280" y="256" width="27" height="12" rx="2" fill="#3fb950" />
      <text x="317" y="266" fill="#3fb950">1.0&#215;</text>
    </g>
    <g>
      <text x="88" y="290" fill="#e6edf3">@expo/plist</text>
      <rect x="280" y="280" width="129" height="12" rx="2" fill="#484f58" />
      <text x="419" y="290" fill="#8b949e">4.7&#215; slower</text>
    </g>
    <g>
      <text x="88" y="314" fill="#e6edf3">plist</text>
      <rect x="280" y="304" width="340" height="12" rx="2" fill="#484f58" />
      <text x="630" y="314" fill="#8b949e">12.4&#215; slower</text>
    </g>

    <!-- Parse binary -->
    <text x="88" y="346" fill="#8b949e" font-size="11" letter-spacing="2">PARSE BINARY</text>
    <g>
      <text x="88" y="374" fill="#e6edf3">rork-plist (view)</text>
      <rect x="280" y="364" width="103" height="12" rx="2" fill="#3fb950" />
      <text x="393" y="374" fill="#3fb950">1.0&#215;</text>
    </g>
    <g>
      <text x="88" y="398" fill="#e6edf3">plist</text>
      <rect x="280" y="388" width="134" height="12" rx="2" fill="#484f58" />
      <text x="424" y="398" fill="#8b949e">1.3&#215; slower</text>
    </g>
    <g>
      <text x="88" y="422" fill="#e6edf3">bplist-parser</text>
      <rect x="280" y="412" width="340" height="12" rx="2" fill="#484f58" />
      <text x="630" y="422" fill="#8b949e">3.3&#215; slower</text>
    </g>

    <!-- Build binary -->
    <text x="88" y="454" fill="#8b949e" font-size="11" letter-spacing="2">BUILD BINARY</text>
    <g>
      <text x="88" y="482" fill="#e6edf3">rork-plist</text>
      <rect x="280" y="472" width="89" height="12" rx="2" fill="#3fb950" />
      <text x="379" y="482" fill="#3fb950">1.0&#215;</text>
    </g>
    <g>
      <text x="88" y="506" fill="#e6edf3">plist</text>
      <rect x="280" y="496" width="143" height="12" rx="2" fill="#484f58" />
      <text x="433" y="506" fill="#8b949e">1.6&#215; slower</text>
    </g>
    <g>
      <text x="88" y="530" fill="#e6edf3">bplist-creator</text>
      <rect x="280" y="520" width="340" height="12" rx="2" fill="#484f58" />
      <text x="630" y="530" fill="#8b949e">3.8&#215; slower</text>
    </g>

    <line x1="64" y1="552" x2="896" y2="552" stroke="#30363d" />
    <text x="88" y="574" fill="#8b949e">Apple M5 Max &#183; Node.js 24 &#183; plutil-canonical fixtures &#183; pnpm bench:compare</text>
    <text x="88" y="594" fill="#8b949e">binary parse uses data: "view", matching the other parsers' aliasing</text>
  </g>
</svg>
