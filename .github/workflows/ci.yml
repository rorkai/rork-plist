# Full verification gate for pull requests and main.
#
# The matrix covers both operating systems on purpose: macOS runs the plutil
# cross-validation suite (the empirical ground truth for what Apple parsers
# accept), while Linux exercises the portable code paths.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: checks (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The contributor toolchain needs Node 22.18+ (declared in
        # devEngines); the published artifact's runtime floor (Node 20) is
        # verified by the runtime-floor job. setup-node resolves each major
        # to its latest release, which satisfies the 22.18 floor.
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build, format check, lint, typecheck, and the full test suite.
      - run: pnpm checks
      # Re-run the suite with V8's flag for the standard Uint8Array base64
      # codec, which stock Node does not enable yet. This exercises the
      # native decode tier and its differential test against this library's
      # own paths. Worker threads inherit process-wide V8 flags, so the run
      # pins the threads pool; the default forks pool spawns child processes
      # that would drop the flag.
      - if: matrix.node == 24
        name: tests with the standard base64 codec enabled
        run: node --js-base-64 ./node_modules/vitest/vitest.mjs run --pool=threads
      # Catch packaging mistakes (missing files, broken exports) before a
      # release does. `pnpm pack` assembles the tarball without contacting the
      # registry — unlike `publish --dry-run`, which refuses once the current
      # version is already published and would fail every push to main.
      - if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: pnpm pack --pack-destination "$RUNNER_TEMP"

  # The engines floor is a runtime claim about the published artifact, not
  # about the contributor toolchain — build on a current Node, then execute
  # the built output on the oldest supported one.
  runtime-floor:
    name: runtime floor (node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Round-trip through the built artifact on Node 20
        run: |
          node --input-type=module -e '
            import { buildPlist, parsePlist } from "./dist/index.js";
            const value = { name: "rork", bytes: new Uint8Array([1, 2, 254]), items: [1, true, "x"] };
            const parsed = parsePlist(buildPlist(value));
            const ok = JSON.stringify(parsed, (k, v) => (v instanceof Uint8Array ? [...v] : v)) ===
              JSON.stringify(value, (k, v) => (v instanceof Uint8Array ? [...v] : v));
            if (!ok) {
              console.error("round trip mismatch", parsed);
              process.exit(1);
            }
            console.log("node 20 runtime ok");
          '
